name: Deploy leantime and gatus app

on: 
  push:
    branches: 
      - master

permissions:
  id-token: write

jobs:
  deploy-leantime:
    name: Deploy Leantime App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

  deploy-gatus:
    name: Deploy Gatus App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: configure config.yaml
        run: |
          sed -i "s|token: .*|token: ${{ secrets.TOKEN }}|" gatus/config.yaml
      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR and push Docker image
        run: |
          cd gatus
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 442908905515.dkr.ecr.us-east-1.amazonaws.com
          docker build -t lks-gatus .
          docker tag lks-gatus:latest 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker tag lks-gatus:latest 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
          docker push 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker push 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
      - name: Get task definition
        id: get-task-def
        run: |
          aws ecs describe-task-definition --task-definition lks-gatus-app > gatus/task-definition.json
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: gatus/task-definition.json
          service: lks-gatus-app
          cluster: lks-oss-cluster
        
        
