name: Deploy leantime and gatus app

on: 
  push:
    branches: 
      - master

permissions:
  id-token: write

jobs:
  deploy-leantime:
    name: Deploy Leantime App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Leantime image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile.leantime
          push: true
          tags: your-dockerhub-username/leantime:latest

  deploy-gatus:
    name: Deploy Gatus App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: configure config.yaml
        run: |
          sed -i "s|token: .*|token: ${{ secrets.TOKEN }}" confifg.yaml
      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 442908905515.dkr.ecr.us-east-1.amazonaws.com
          docker build -t lks-gatus .
          docker tag lks-gatus:latest 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker tag lks-gatus:latest 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
          docker push 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker push 442908905515.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
